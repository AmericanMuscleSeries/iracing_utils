syntax = "proto3";
option optimize_for = SPEED;

// Data structures describing the league

enum eSortBy
{
  Earned=0;
  ForcedDrops=1;
}

enum ePositionValue
{
  Overall=0;
  Class=1;
}

message GroupRulesData
{
  string    Group          = 1;
  int32     MinCarNumber   = 2;
  int32     MaxCarNumber   = 3;
  int32     RacesCounted   = 4; // How many races to count for this group (inverse of num drops)
}

message PenaltyData
{
  int32 Race    = 1;
  int32 Driver  = 2;
}

message TimePenaltyData
{
  PenaltyData Base    = 1;
  int32       Seconds = 2;
}

message PointsMultiplierData
{
  int32            Race         = 1;
  float            Position     = 2;
  // Bonus
  float            CleanDriver  = 3;
  float            FastestLap   = 4;
  float            FinishRace   = 5;
  float            LeadALap     = 6;
  float            MostLapsLead = 7;
  float            PolePosition = 8;
}


message PointsThresholdData
{
  float MinimumRequirement = 1; // < 1 is a % of the race, >= 1 is minimum number of laps back
  int32 Points             = 2;
}

message LapThresholdData
{
  int32 NumLaps  = 1;
  int32 Points   = 2;
}

message FastLapThresholdData
{
  LapThresholdData Base = 1;
  int32            TimePercent = 2; // Percent of time to apply points, such as 107% of a fast lap
}

message IncidentPointsData
{
  map<int32,int32> PointMap           = 1; // Map of number of incidents to the points received
  float            MinimumRequirement = 2; // < 1 is a % of the race, >= 1 is minimum number of laps back
  bool             SeparatePoints     = 3; // Include Incident points in race points or not
}

message ScoringSystemData
{
  float                         MinimumRaceDistance = 1; // < 1 is a % of the race, >= 1 is minimum number of laps back needed to get any points for a race
  int32                         PolePosition        = 2; // Points received for getting pole position
  LapThresholdData              CleanLaps           = 3; // Points for a number of clean laps
  FastLapThresholdData          FastCleanLaps       = 4; // Points for a number of clean laps within a drivers fastest lap
  PointsThresholdData           FastestLap          = 5; // Points received for getting fastest lap in the race
  PointsThresholdData           LeadALap            = 6; // Points received for leading a lap
  PointsThresholdData           MostLapsLead        = 7; // Points received for leading the most laps
  PointsThresholdData           FinishRace          = 8; // Points received if you finish X% of the race
  IncidentPointsData            CleanDriver         = 9; // Map of points to get based on your incidents
  bool                          SeparatePool        = 10;// Use the same pool of points per class or not
  ePositionValue                PositionValue       = 11;// How to assign a position value to a league with more than one class
  repeated PointsMultiplierData RaceMultiplier      = 12;
}

// Race winner will get TopScore, each subsequent racer will get 1 less point
// Drivers outside of the TopScore will get zero points (not negative points)
message LinearDecentScoringData
{
  ScoringSystemData Base     = 1;
  int32             TopScore = 2;
  bool              Handicap = 3;
}

// Specify the points for each finishing position
message AssignmentScoringData
{
  ScoringSystemData Base          = 1;
  map<int32,int32>  PositionScore = 2; // Key is position, value is the the amount of points awarded
}

message AnyScoringSystemData
{
  oneof System
  {
    LinearDecentScoringData  LinearDecent = 1;
    AssignmentScoringData    Assignment   = 2;
  }
}

message SheetsDisplayData
{
  string  ID     = 1; // Unique key from sheet URL
  eSortBy SortBy = 2;
}

message LeagueConfigurationData
{
  int32                         iRacingID        = 1;
  string                        g61ID            = 2;
  string                        Name             = 3;
  string                        Season           = 4;
  AnyScoringSystemData          ScoringSystem    = 5;
  repeated int32                NonDrivers       = 6;
  repeated int32                PracticeSessions = 7;
  repeated GroupRulesData       GroupRule        = 8;
  repeated PenaltyData          Disqualification = 9;
  repeated TimePenaltyData      TimePenalty      = 10;
}

// Data structures for holding iRacing data

message LeagueResultData
{
  map<int32, MemberData> Members = 1; // Key is driver iracing id (why do I need members again?)
  map<int32, DriverData> Drivers = 2; // Key is driver iracing id
  map<int32, RaceData>   Races   = 3; // Key is race number
}

message MemberData
{
  string    Name     = 1;
  string    Nickname = 2;
}

message DriverData
{
  string    Name                 = 1;
  int32     OldRating            = 2;
  int32     NewRating            = 3;
  int32     CarNumber            = 4;
  string    Group                = 5;
  int32     TotalRaceStarts      = 6;
  // Points
  int32     EarnedPoints         = 7;  // With all added bonuses
  int32     DropPoints           = 8;  // Earned points removed due to drop weeks
  int32     HandicapPoints       = 9;  // Computed like a golf handicap
  int32     CleanDriverPoints    = 10;
  int32     CompletedRacesPoints = 11;
  // Pole Position
  int32     TotalPolePositions   = 12;
  int32     PolePositionPoints   = 13;
  // Finishings
  int32     TotalWins            = 14;
  float     AverageFinish        = 15;
  int32     RaceFinishPoints     = 16; // Points from finishing position scoring system (no bonuses)
  int32     TotalIncidents       = 17;
  int32     TotalLapsComplete    = 18;
  int32     TotalCompletedRaces  = 19; // Competed per FinishPointsData
  // Laps Lead
  int32     TotalLeadALap        = 20; // Number of races lead a lap
  int32     LeadALapPoints       = 21;
  int32     TotalMostLapsLead    = 22; // Number of races lead the most laps
  int32     MostLapsLeadPoints   = 23;
  // Clean Laps
  int32     TotalCleanLaps       = 24;
  int32     CleanLapsPoints      = 25;
  // Fast Laps
  int32     TotalFastestLaps     = 26; // Number of races with the fastest lap
  int32     FastestLapPoints     = 27;
  int32     TotalFastCleanLaps   = 28;
  int32     FastCleanLapsPoints  = 29;
  // Trueskill
  float     Mu                   = 30;
  float     Sigma                = 31;
}

message LapData
{
  int32  Driver                = 1;
  bool   Clean                 = 2;
  int32  Number                = 3;
  int32  Position              = 4;
  float  Time                  = 5;
  string TimeStamp             = 6;
  int32  SessionTime           = 7;
}

message ResultData
{
  string Car                  = 1;
  bool   MetMinimumDistance   = 2;
  bool   PolePosition         = 3;
  bool   FastestLap           = 4;
  int32  StartPosition        = 5;
  int32  FinishPosition       = 6;
  int32  Points               = 7;
  int32  HandicapPoints       = 8;
  int32  CleanDriverPoints    = 9;
  int32  CompletedRacePoints  = 10;
  float  Interval             = 11;
  int32  Incidents            = 12;
  int32  LapsCompleted        = 13;
  int32  CleanLaps            = 14;
  int32  CleanLapsPoints      = 15;
  int32  LapsLead             = 16;
  bool   MostLapsLead         = 17;
  float  FastestLapTime       = 18;
  float  FastestLapTimeStamp  = 19;
  int32  FastCleanLaps        = 20;
  int32  FastCleanLapsPoints  = 21;
  float  Mu                   = 22; // Trueskill
  float  Sigma                = 23; // Trueskill
  repeated LapData Laps       = 24;
}

message GroupStatsData
{
  int32  Count                   = 2;
  int32  PolePositionDriver      = 3;
  int32  PolePosition            = 4;
  int32  WinningPosition         = 5;
  int32  WinningDriver           = 6;
  int32  FastestLapDriver        = 7;
  float  FastestLapTime          = 8;
  float  FastestLapTimeStamp     = 9;
  int32  MostLapsLeadDriver      = 10;
  int32  MostLapsLead            = 11;
  repeated int32 LapsLeadDrivers = 12;
}

message RaceData
{
  int32                       SubsessionID = 1;
  string                      Date         = 2;
  string                      Track        = 3;
  map<int32, ResultData>      Grid         = 4; // key is driver iracing id
  map<string, GroupStatsData> GroupStats   = 5; // key is group
}

message EventData
{
  string                      Name         = 1;
  int32                       Year         = 2;
  int32                       NumSplits    = 3;
  bool                        IsMulticlass = 4;
  map<int32, EventResultData> Results      = 5; // Key=Split
}

message EventResultData
{
  int32                    SubsessionID       = 1;
  int32                    StrengthOfField    = 2;
  string                   URL                = 3;
  map<string, int32>       StrengthOfCategory = 4; // Key is category
  map<string, int32>       NumCategoryCars    = 5; // Key is category
  map<string, int32>       NumCategoryLaps    = 6; // Key is category
  map<int32,EventTeamData> Teams              = 7; // Key is iracing team id
}

message EventTeamData
{
  string                   Name                  = 1;
  string                   Category              = 2;
  string                   Car                   = 3;
  int32                    CarNumber             = 4;
  string                   ReasonOut             = 5;
  int32                    FinishPosition        = 6;
  int32                    FinishPositionInClass = 7;
  int32                    TotalIncidents        = 8;
  int32                    TotalLapsComplete     = 9;
  int32                    Owner                 = 10;
  map<int32, DriverData>   Drivers               = 11; // Key is driver iracing id
  map<int32, MemberData>   Members               = 12; // Key is driver iracing id
  repeated LapData         Laps                  = 13;
}
